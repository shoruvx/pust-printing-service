name: pust_printing_service

description: A new Flutter project for the PUST Printing Service app.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.1.1+3

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.4
  dio: ^5.1.0
  file_picker: ^11.0.2
  shared_preferences: ^2.0.11
  uuid: ^4.5.3
  intl: ^0.20.2
  google_fonts: ^8.0.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  image_picker: ^1.1.2
  # Add any other required packages here as needed.

flutter:
  uses-material-design: true
  assets:
    - assets/images/
dev_dependencies:
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/pust_logo.png"
